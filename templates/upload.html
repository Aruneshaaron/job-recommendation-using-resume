<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Document</title>
    <style>
             @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

* {
  margin: 0;
  
  font-family: "Poppins", sans-serif;
}
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("static/resume.jpg");
      background-position:center;
      background-repeat: no-repeat;
      background-size: cover;
        }
        h1 {
            position: absolute;
            top: 150px;
       
            font-size: 35px;
            color: #333;
            margin-bottom: 20px;
            
        }
        form {
            
            
            margin-top: 20px;
        }
        input[type="file"] {
            font-size: 18px;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #ccc;
            margin-bottom: 10px;
        }
        input[type="submit"] {
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            margin-left: 10px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .loader {
  display: none;
  position: fixed;
  top: 70%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  font-weight: bold;
}
    </style>
</head>
<body>
    <h1>Resume Upload</h1>  
    <form action="/upload"method="post" enctype="multipart/form-data">
    <input type="file"  name="resume_file" accept=".pdf">
    <input id="uploadButton" type="submit" value="upload">
    <div id="loader" class="loader">Loading...</div>
</form>
<script>
    document.getElementById("uploadButton").addEventListener("click", function() {
    document.getElementById("loader").style.display = "block"; // Show the loader message
    // Perform your upload operation here
  });
  
  </script>
</body>
</html>
