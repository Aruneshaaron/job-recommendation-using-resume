<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Toggle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
             @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

* {
  margin: 0;
  
  font-family: "Poppins", sans-serif;
}
        body {
            background-image: url("static/first.png");
            background-size: cover;
        }
        #form-container {
            width: 300px;
            margin: 50px auto;
        }

        /* Style the navigation bar */
        .navbar {
            position: absolute;
            top: 5px;
            right: 5px;
            margin-bottom: 20px;
        }

        /* Style the navbar buttons */
        .navbar button {
            background-color: khaki;
            color: black;
            border: none;
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Style the form */
        form {
            display: none;
             background: linear-gradient(to right, #121950, #840032); /* Dark blue to light red gradient */
            padding: 20px;
            border-radius: 5px;
            color: whitesmoke;
            margin-top: 150px;
        }

        /* Style the labels */
        label {
            display: block;
            margin-bottom: 10px;
        }

        /* Style the inputs */
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Style the submit button */
        input[type="submit"] {
            background-color:khaki;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 80px;
        }

        input[type="submit"]:hover {
            background-color: #e7a0cb;
        }
    </style>
</head>
<body>

<div class="navbar">
    <!-- <a href="/"> <button><i class="fas fa-arrow-left">Back</i></button></a> -->
    <button onclick="toggleForm('register-form')"><i class="fas fa-user-plus"></i> Register</button>
    <button onclick="toggleForm('login-form')"><i class="fas fa-sign-in-alt"></i> Login</button>
</div>

<div id="form-container">
    <form id="register-form" method="POST" action="/register">
        <h2><i class="fas fa-user-plus"></i> Register Form</h2>

        <label for="user_name"><i class="fas fa-user"></i> Username:</label>
        <input type="text" name="user_name" required>
        <br>
        <label for="user_email"><i class="fas fa-envelope"></i> Email:</label>
        <input type="email" name="user_email" required>
        <br>
        <label for="password"><i class="fas fa-lock"></i> Password:</label>
        <input type="password" name="password" required>
        <br>
        <input type="submit" value="Register">
    </form>

    <form id="login-form" method="POST" action="/login">
        <h2><i class="fas fa-sign-in-alt"></i> Login</h2>

        <label for="user_email"><i class="fas fa-envelope"></i> Email:</label>
        <input type="email" name="user_email" required>
        <br>
        <label for="password"><i class="fas fa-lock"></i> Password:</label>
        <input type="password" name="password" required>
        <br>
        <input type="submit" value="Login">
    </form>
</div>

<script>
    function toggleForm(formId) {
        var forms = document.querySelectorAll('form');
        forms.forEach(function(form) {
            form.style.display = 'none';
        });

        var selectedForm = document.getElementById(formId);
        if (selectedForm) {
            selectedForm.style.display = 'block';
        }
    }

   
</script>

</body>
</html>
