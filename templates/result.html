<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-LI/8ooJBpp/ZS5dlYbDw+of7Vh+jbBRP47/NT9Cf37V3n2vLEj8N4Qqd79+1Hejj5kbC1RUrZ7HdC67Qv2lW4Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Resume Parsing Results</title>
    <style>
             @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

* {
  margin: 0;
  
  font-family: "Poppins", sans-serif;
}
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        height: 100vh;
            background-image: url("static/result.jpg");
      background-position:center;
      background-repeat: no-repeat;
      background-size: cover;
      color: white;
    }
    h1{
        color: white;
        font-weight: bold;
    }
     h2 {
        color: #e5ff00;
        font-weight: bold;
    }
    ul {
        list-style-type: none;
        padding: 0;
    }
    li {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 5px;
        color: aqua;
        
        font-size: 17px;
    }
    button{
        position: absolute;
        top: 5px;
        left: 5px;
        background-color: aliceblue;
        border: none;
        padding: 8px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    
    }
    .back{
        position: absolute;
        left: 100px;
    }

</style>
</head>
<body>
    <a href="/"><button>logout</button></a>
    <div class="back">
    <a href="/back"><button>back</button></a>
    </div>
    <h1>Resume Parsing Results</h1>
    <h2>Companies</h2>
    <ul>
        {% for company in companies %}
            <li>{{ company }}</li>
        {% endfor %}
    </ul>
    <h2>Job Roles</h2>
    <ul>
        {% for jobs in job %}
            {% if jobs != 'Unknown Role' %}
                <li>{{ jobs }}</li>
            {% endif %}
        {% endfor %}
    </ul>
</body>
</html>
